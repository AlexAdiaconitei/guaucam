# GuauCam configuration.
# Threshold/duration/cooldown: change them from the web panel (port PANEL_PORT), no restart needed.
# Everything else: edit here and then  sudo systemctl restart guaucam-stream guaucam-detector

# ── Camera ──
# CAMERA_TYPE=usb → UVC USB webcam (Logitech C920/C922...): ustreamer relays its MJPEG
# CAMERA_TYPE=csi → ribbon camera module (OV5647 / Pi Camera...): picamera2 + hardware encoder
# The installer detects it for you; if you swap cameras, re-run install.sh
# (or edit this by hand and restart guaucam-stream).
CAMERA_TYPE=usb
# usb only (the installer writes the stable /dev/v4l/by-id/... path)
VIDEO_DEVICE=/dev/video0

# ── Video ──
# 1080p does NOT fit in the Pi Zero W's 2.4GHz WiFi
RESOLUTION=1280x720
FPS=15
# MJPEG bitrate in bits/s (CSI camera only; USB webcams compress on-board).
# Lower it if remote viewing stutters. 4 Mbps is plenty for 720p@15.
BITRATE=4000000
PORT=8080

# ── Web panel ──
PANEL_PORT=8081

# ── Noise detector ──
# AUDIO_DEVICE=auto uses the first USB mic it finds (the webcam's).
# CSI modules have no mic: without a USB mic, the panel works with no meter or alerts.
AUDIO_DEVICE=auto
# Level in dBFS (0 = max, -90 = silence)
THRESHOLD_DB=-25
SUSTAINED_SECONDS=3
COOLDOWN_SECONDS=300

# ── Telegram ──
# Alerts and bot commands (/screenshot, /video, /live) reach every chat_id listed
# here (comma-separated). Add/remove them from the web panel, no restart needed.
TELEGRAM_TOKEN=
TELEGRAM_CHAT_IDS=
